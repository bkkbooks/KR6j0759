front:
  text: 天溪准提三昧行法序准提懺儀從無善本者何也世尊言此大毗盧遮那如來瑜伽大教三摩耶灌頂道場如來祕密法門成佛心要而世師以淺智測量止順初機不知直接上根超凡入聖則體會宗趣之難也根本微妙字輪雖說文字皆是善文字義離一切相自性虗空亦復不生虗空之心世尊教外別傳之指而世師以文字求之變觀行為名言翻神宗為音韻則離名離相之難也龍樹菩薩於持明藏略出大明成就儀軌凡戒行發心布字結印持誦懺摩入三摩觀智各有規式而世師株守別懺遺文槩從疏略則遵奉儀軌之難也經呪自地婆訶羅譯而外有金剛智不空崛多玄奘天息灾法賢金剛幢諸譯句引不同轉讀有注音含長短字有重輕世師漫作聲勢多乖梵韻則指決字聲之難也經說念誦觀行供養次第先須受持禁戒堅固不退心不散亂方許入此法門今俗流帶妻挾子飲酒噉肉緇素不分混濫壇席則嚴持戒律之難也天溪老人戒行精嚴深入觀智窮理而無理障證空而不墮空一義差別則遍考群經一字參差則研窮經歲十章明法三密加持觀其頓超地位速離纏疴則一行禪師之研通神變也顯教密宗該性含相則法幢公之圓通心要也一字說千門之妙多言總五部之歸則金剛幢之密呪圓因也無相三昧形如滿月佛性之義廓然虗明則龍樹尊者之顯密圓宗也以茲行法方彼諸家則妙高之落衆峰靈耀之掩羣照豈虗言哉往豫奉教天溪歸述舊聞十八章面求指摘老人往返酬答動輒數千言轉綜密部深思觀旨參之以般若理趣準之於瑜伽教王兩人見處或有抵捂罔不平心較量可起改者起改之可仍襲者仍襲之豫年耄學荒交遊星散同好中有亦鑒無姑息者非天溪吾誰自歸歟行法善本成老人索豫數言前之因述豫平時歸嚮之誠如此若夫樹高招風門庭黨伐此非吾兩人之所知也康熙八年己酉秋八月行純范驤拜書準提三昧行法序夫陀羅尼呪出於果位人口非蓮華眼不能視其際非金剛手不能棒其體然章句有廣略之殊廣則纍言不為有餘略則一言不為不足豈所謂至大同小不見邊表極小同大忘絶境界者乎而至心誦持無不獲益如準提神呪梵字無多功效最勝金剛智譯本載之詳矣然呪屬總持即稱祕密要知總莫總於真性密莫密於惟心若見此心融歸性地則罪無可滅福不足生矣受持者可不識觀心之要乃以緣壇印守字聲為專務歟天溪景淳法師以台衡世傳三昧作準提持誦軌儀將入壇先責尸羅清淨既入壇更須緇素分明會三德則本自天然印十乘則尤為妙合當機清衆如法行持以無取著心獲不思議效捷於聲響正足諦信矣蓋如來說法即事顯真四肘方壇何莫非法身鏡光影現何莫非般若燒香散華何莫非解脫智者隨觸即得愚者𮨇自昧焉今景師統以心觀照之將見無量諸佛皆從持誦家心聲流出況世諦門頭遂諸求願抑復何有乃後知大準提即如意珠王出生饒給無所不遍七俱胝佛母之所宣說果字字方放光匝虗空透金石所貴人開擇法眼善為點出耳則景師指端已現明月輪行道者其向往之康熙歲次乙巳仲春寶輪沙門明源書准提三昧行法目次序二章述勸修第一明受戒發心第二定行人及日期時教第三出正修方法第四一嚴治道場二清淨三業三三業供養四請三寶諸天五讚歎申誠六作禮七持呪八修行五悔九行道旋繞十入三摩地分持明驗相第五附本呪同譯准提三昧行法目次終
