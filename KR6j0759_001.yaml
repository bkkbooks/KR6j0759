body:
  text: 天溪比丘受登集述勸修第一此大陀羅尼三世諸佛己今當說而我釋迦亦如是說葢為利樂眾生得入菩提故也今夫一切眾生未種善根無菩提分而能誦持一二徧者善根芽生菩提有分若出家菩薩現生所求出世悉地定慧現前證地波羅蜜圓無上菩提者在家菩薩現世所求常生天界或作人王親近聖賢諸天擁護世無災橫心無憂愁者若欲滅除五逆十惡一切重罪積集十善六度無量功德諸大菩薩為其說法十方佛土常得隨從者若有欲令國王大臣長者居士等生愛敬心起利樂意隨其所願悉得成就者有諸福報不全壽命短促求官不遷眾苦交逼願令現世得輪王福具壽者相祿位高崇諸事吉祥者至願水不能溺火不能燒毒藥刀兵冤家疾疫皆不為害而能轉惡為善者應於道場之中約事要期一心精進修此准提三昧葢此陀羅尼是三世諸佛祕密之藏七俱胝如來三身讚說故龍樹以為總攝二十五部而獨部別行者譬則如意之珠寶中最上其入海採者必先求此今既得聞是最上法必也發心專志尊之仰之而修證焉離生死於片念決三昧於一期故當不計身命盡力爭先也寧更因循緩怠竢於異時乎明受戒發心第二念誦儀云苾蒭苾蒭尼先持戒行若入道場復須自誓發願受戒若在家者初入道場亦須隨力發願受三歸五戒或持八戒齊故方等三昧令依一解內外律師發露受二十四戒是知欲入道場必又重嚴戒法所謂尸羅不清淨三昧不現前此先佛明誨極宜奉重也既受戒已當發廣大菩提之心行菩薩行夫菩提心者成佛正因智慧根本故從今日往至成正覺唯以四弘誓願要心弘誓在懷諦理明切菩提心戒儀云諸法無我平等如空心本不生空性圓寂當知性空圓寂之處即是感應道交之時感應道交菩提心之端也是故興慈運悲上求下化繁修六度靜住一如離三障以清淨顯三德之圓融原始要終莫不在是矣此受戒發心二法為行人起行之要門標心之正處自宜攝心稟學豁意開明倘此昧略而不省鑒豈唯徒為苦行大能作諸障難者也定行人及日期時數第三修真言者既得外護委以經紀擇同行者十人已還同心齊志如乘一船又復別請一阿闍黎以為教授即方等三昧明內外律師示明觀道開除妨障往時僧俗同一處修今如有俗眾同修當設一界相以隔之雖同一道場而不共壇席以在家者縱沾戒品未具道儀進止失諧反成擾動故也勿以勢位強從亦勿人情輙順僧輩尚當汰別俗眾其容混諸比見風俗漫亂多不如法如欲聖應昭彰亦宜謹始於此也日期者經明七日二七日乃至七七日而公圓通集定百二十日今約法審機定三七日為一期精進修法一七二七增至七七皆隨人力然是初修之程限耳畢生修者未必全從又正修前須作方便若不嚴淨身心諳練儀制卒入道場則道心不發無所感降是故于一七日先自斷除一切緣務損眠節食調伏其心而又誦習悔文引繹觀道仍求三寶加護進道無魔庶能定慧現前悉地成滿時數者經云或三時或四時或六時依法誦持求世間出世間悉地是則晝三夜三為進修者之通軌矣出正修法第四斯經梵本有十萬偈今三譯文極為隱略然考作法取相無生三種法門具有無缺而功能作法及以取相似又稍詳故西土修真言者廣輯諸部壇儀印呪而次比之用輔本呪為觀行法名念誦儀譯傳東夏代咸稱習過化間有泥法時多故不無專緣壇印偏守字聲之弊良由未達理觀為主誦持居次之意耳今之方法雖三種懺法相須而進而無生理觀實為前導諸法性空萬行無作圓因據為標準大果取以指歸然以今立方法用勘昔之誦儀名數不差前後互異以故先引誦儀與此對合然後正出十意依次進修也其誦儀中初作曼荼羅則今法治道場也次入道場先禮佛懺悔隨喜勸請發願回向今禮佛移置第六五悔移置第八也次敷坐三部印呪即今總禮三寶護身今第二清淨三業也結界今併入嚴道場中迎請今第四請三寶諸天也五供養今第三三業供養也梵讚今第五讚嘆也布字及聲誦今第七持呪也三摩地念誦今移置第十也欲出道場復須依前次第五供養五悔送還此當第九行道葢行旋梵唄之法正是一時法事將終乃復運前所修為事冥契三德藏海且寓攀住之意故義理實同重結三部印即三自歸也是則前後有差儀文無別次第勘同顯密一體十科明法通是密因三密加持同成顯觀矣次十意方法者一嚴治道場二清淨三業三三業供養四請三寶諸天五讚歎申誠六作禮七持呪八修行五悔九行道旋繞十入三摩地初入道場第一時具足修此十法于後一一時中略去請佛餘九悉行無異仍以法華三昧補助儀觀想句偈注於事儀之下俾正修時一以無生理觀而融即之當知此十各具事理皆通感應俱徧三業悉淨三障咸會三德是為今家三昧正途如是觀已用進修焉自不同於專緣壇印為指歸偏守字聲為究竟爾矣一嚴治道場先明治壇嚴像次明結界應擇勝地掘深一肘佛肘三尺六寸除去舊土別取新土填滿築平或高原處或大河灘岸穿去五尺已下其土則新復取淨土和雜香末量地四肘作方曼荼羅經用瞿摩夷和土塗壇此須雪山白牛所退純噉肥膩香潔可用此方難得故用香土上懸寶葢四面徧垂繒幢旛彩紈扇白拂等正中奉安俱胝佛母本尊像西向安座原出聖裁按四護摩法增益護摩決當西向今是出世悉地準古施設或隨方宜酌取行之若無本尊隨安所有佛像舍利及大乘經呪亦得行者別置卑座對像安列慮地卑濕周敷薦席又以香水灑洗地界處處按察極令合式至建首日當用齋日入壇以白檀香塗作八曼荼羅猶如滿月此八曼荼羅是八大菩薩三摩地境即佛菩薩根本心大明也不空譯云九箇聖位是乃合佛母而名之耳即以新淨供具盛諸飲食及好香華燈明遏伽香水隨力所有布列供養傾心竭意嚴潔如法何者內心敬重三寶超出三界今欲奉請供養豈可輕心若不拔己資財供養大乘則將何以招感賢聖滅重罪而成妙果乎結界者經云若欲求願先須念誦加持香水散於八方上下以為結界行者於道場四邊或取五色線或勾欄等先標界相以齊修行之處當入道場時心想十方諸佛本尊佛母當來坐故燒香散華肅豫嚴待即取淨水呪一百八徧散灑四方上下成結界法二清淨三業念誦儀云於所在處清淨澡浴著新淨衣於四威儀發四弘誓於一切事心不散亂法華三昧云初入道場當以香湯沐浴著淨潔衣若大衣及諸新染服若無新者當取己衣中勝者以為入道場衣於後若出道場至不淨處當脫淨衣著不淨衣所為事竟當洗浴著本淨衣入道場行法大悲三昧云縱一日都不至穢亦須一浴終竟一期專莫雜語及一切接對問訊等終竟一期依經運想不得剎那念於世務若便利飲食亦須秉護勿令散失事畢即入道場不得托事延緩大要身論開遮口論說默意論止觀也三三業供養止觀云燒香運念三業供養行者初入道場至法座前敷尼師壇正身合掌倚立如是思惟我為眾生發菩提心興慈運悲誓欲救而復慚愧懇惻存想三寶𡍫塞虗空影現道場手執香爐燒眾名香口唱三寶五體投地首者舉云一切恭敬此下異口同音一心頂禮十方法界常住佛心隨身口一心頂禮無分散想了知此身如影不實能禮所禮心無所得一切眾生亦同入此法界海中一心頂禮十方法界常住法此與下僧用心如上一心頂禮十方法界常住僧禮三寶竟互跪燒香以手擎華首者白云是諸眾等各各互跪嚴持香華如法供養此下眾同聲唱願此香華雲徧滿十方界一一諸佛土無量香莊嚴具足菩薩道成就如來香想云我此香華徧十方以為微妙光明臺諸天音樂天寶香諸天肴膳天寶衣不可思議妙法塵一一塵出一切塵一一塵出一切法旋轉無礙互莊嚴遍至十方三寶前十方法界三寶前悉有我身修供養一一皆悉遍法界彼彼無雜無障閡盡未來際作佛事普熏法界諸眾生蒙熏皆發菩提心同入無生證佛智想已起首者白結供養已一切恭敬一禮四請三寶諸天運心供養已互跪燒香當念三寶雖離障清淨而以同體慈悲護念羣品若能三業致請必不來而來苦與樂念誦儀云准提佛母并八大菩薩及諸聖眾眷屬圍繞不離本土來至道場空中而住受我供養故今逐位殷勤三請必有感降下去每位燒香互跪三請請竟起禮一心奉請南無本師七俱胝佛母准提世尊此即本師釋迦所從埀跡之本身毗盧遮那如來也金剛智念誦儀云想於阿迦尼吒天宮毗盧遮那如來十地菩薩圍繞會中請佛母准提聖者不空譯本同瑜伽大教王經云大徧照金剛如來也七俱胝本經所明大乘莊嚴寶王經與持明藏成就儀明七十七俱胝隨機異耳想云我三業性如虗空准提佛母亦如是不起真際為眾生與眾俱來受供養下去諸佛及菩薩聖僧但隨位改想名號形相來處一心奉請南無過去七俱胝准提世尊今之陀羅尼是此過去七俱胝佛已說一心奉請南無現在七俱胝准提世尊經云現在諸佛今說是呪念誦儀云准提佛母與七俱胝佛圍繞莊嚴寶王經云爾時七十七俱胝佛一時現前而世尊即說是呪此等正是現在七俱胝佛一心奉請南無未來七俱胝准提世尊經云未來諸佛當說是呪此是未來七俱胝佛一心奉請南無東方善德佛等十方十佛世尊一心奉請南無七俱胝如來三身讚說准提陀羅尼想云法性如空不可見常住法寶難思議我今三業如法請唯願顯現受供養下同一心奉請南無五部所攝諸陀羅尼及十方三世一切尊法一心奉請南無本尊准提菩薩摩訶薩瑜伽大教王經云觀想尊字變成大智大智化成尊那菩薩七俱胝如來三身讚說𦘕相有二十六臂三面面各三目金剛智不空二經明一面三目一十八臂持明藏成就儀云若以尊那為本部即以尊那為中座想尊那菩薩一十八臂面有三目云云菩薩賢聖隨意安布唵字為烏瑟膩沙如來左字為大輪明王隷字為不動尊明王卒字為觀自在菩薩隷字為不空罥索菩薩尊字為本尊尊那菩薩禰字為金剛薩埵莎字為伊迦惹吒菩薩賀字為縛日囉曩契菩薩烏瑟膩沙所謂無相法界即毗盧遮那出八菩薩上今此正出八菩薩名然經以此九微妙字成安如來菩薩明王九賢聖者用表尊那菩薩悲智自在方便多門深懷慈愍大現威怒護持修行辟除諸障一時受化成菩提道葢明著本尊喻伽觀也一心奉請南無大輪明王菩薩不動尊明王菩薩摩訶薩一心奉請南無觀自在菩薩金剛手菩薩摩訶薩一心奉請南無不空羂索菩薩伊迦惹吒菩薩縛日囉二合曩契菩薩摩訶薩一心奉請南無十方三世一切菩薩摩訶薩一心奉請南無摩訶迦葉一切諸大聲聞緣覺賢聖僧一心奉請無能勝菩薩多羅菩薩訶利帝母菩薩及一切大忿怒持明王眾此可燒香立請比丘不須致禮俗眾須禮無能勝本是地藏菩薩外現佛部中大忿怒明王自居右位居左者為妃地婆訶羅金剛智二譯並存梵云阿鉢羅氏多聖者多羅是觀音眷屬其狀如中年女人合掌持青蓮微笑鮮白衣為持明王也二位各有經呪別行訶利帝藥叉女也即鬼子母有五百眷屬金光明中與四王密跡同列瑜伽教王經云時徧照金剛如來入訶利帝夜叉女善作歡喜眾成就金剛三摩地出此定已即說訶利帝夜叉女真言其真言法能令諸夜叉女等為持誦者皆來現前作成就事在輪壇中原是忿怒明王今據前二譯經同名菩薩一心奉請大梵尊天三十三天護世四王八部神等二淨居天子二難陀龍王吉祥宮門持明仙眾及此國內名山大川一切靈廟某州地分屬內鬼神此所住處護伽藍神一切聖眾奉請竟首者述請意唯願本師七俱胝准提佛母三世准提如來十方十佛世尊不移本際平等慈熏來降道場證我行法七俱胝佛母所說准提陀羅尼中道祕要顯現道場受我供養本尊准提菩薩摩訶薩大輪不動尊等同壇菩薩乘本願力來到道場神呪加持隨心滿願摩訶迦葉諸大聲聞同運慈悲俱時來降無能勝多羅菩薩訶利帝母等諸大明王願為說法授與法藥却諸魔障示現吉祥梵釋四王天龍八部淨居天子持明諸仙隨我請來堅守道場擁護國界令我所修不違本願齊一禮五讚歎申誠面向法座燒香散華心念三寶微妙功德又了身口意業充滿法界讚歎三寶無生無滅無有自性本經無顯讚文今取龍樹持准提明藏偈用以讚之常以大慈悲調伏諸眾生成福功德海是故我讚禮真如純一理離慾壞諸趣利生住寂靜是故我讚禮堅固持淨戒證入解脫門住最功德剎是故我讚禮准提功德聚寂靜心常持一切諸大難無能侵害者天上及人間受福如佛等遇此如意寶定獲大菩提以此歎佛功德修行大乘無上善根奉福上界諸天龍神八部此土神祇護正法者又為國王帝主土境萬民師僧父母知識檀越廣及法界眾生願藉此善根平等熏修十惡五逆三障消滅功德智慧二種莊嚴開總持門成種智道此三障消滅二種莊嚴自是修懺正願若人以為總略或有別願當隨智力如實說之但所求之事不可增長生死所運之心必須利益羣品申竟致禮六作禮三寶體是無緣慈悲常欲拔濟一切眾生但為無機不能起應我既奉請讚歎冥應不虗故今如對目前受我禮拜燒眾名香五體投地一心頂禮本師七俱胝佛母准提世尊想云能禮所禮性空寂感應道交難思議我此道場如帝珠准提佛母影現中我身影現准提前頭面接足歸命禮下去諸佛菩薩當隨位改如七俱胝佛即云七俱胝佛影現中云云一心頂禮過去七俱胝准提世尊一心頂禮現在七俱胝准提世尊一心頂禮未來七俱胝准提世尊一心頂禮東方無憂世界善德世尊一心頂禮南方歡喜世界栴檀德世尊一心頂禮西方名善世界無量明世尊一心頂禮北方無動世界相德世尊一心頂禮東南方月明世界無憂德世尊一心頂禮西南方眾相世界寶施世尊一心頂禮西北方眾音世界華德世尊一心頂禮東北方安隱世界三乘行世尊一心頂禮下方廣大世界明德世尊一心頂禮上方眾月世界廣眾德世尊一心頂禮七俱胝如來三身讚說准提陀羅尼三禮想云真空法性如虗空常住法寶難思議我身影現法寶前一心如法歸命禮下同一心頂禮五部所攝諸陀羅尼及十方三世一切尊法一心頂禮本尊准提菩薩摩訶薩三禮想云為求滅障接足禮此是懺悔主故一心頂禮大輪明王菩薩摩訶薩一心頂禮不動尊明王菩薩摩訶薩一心頂禮觀自在菩薩摩訶薩一心頂禮金剛手菩薩摩訶薩一心頂禮不空羂索菩薩摩訶薩一心頂禮伊迦惹吒菩薩摩訶薩一心頂禮嚩日囉二合曩契菩薩摩訶薩一心頂禮十方三世一切菩薩摩訶薩一心頂禮摩訶迦葉一切諸大聲聞緣覺賢聖僧七持呪此真言道廣大圓融實相無相離諸分別性同虗空具足三德不縱不橫平等遮持為功德聚諸佛於此不動如如百六十心善超無礙而諸眾生不自證得無明隨順三有淪胥猶持火燼旋轉不停揆厥所由見聞為咎故我准提如來悲生無際從本垂迹三密頓化跡從本垂九字齊彰契理地之智色發教門之聲緣稱體宣流結成梵字欲令眾生開妙覺之知見成本然之智身即此見聞而非見聞法界色聲同一究竟夫第一義理本無聲字而聲字能事為一理門緣聲入智因字盡性離乎聲字亦無解脫今之行者標心立行破障顯理若不布字緣聲入三摩地無由就路還家從因證果故此修法隨立二門即緣聲布字持與入三摩地持龍樹名此為有相持無相持也無相持至第十章明有相持者詳此聲字並是色法通為教體馬鳴云色性即智說名智身天台謂之念法門身也念誦儀云從頂至足以九梵字安布行者身故以唵字布於頂則成一切種智也以折字布於兩瞳神則成真俗二諦也以戾字布左右眼即成慈悲也以主字布於頸喉即成無礙辯也以戾字布左右肩成四弘誓也以准字布心成如來藏也以提字布成三三昧也以莎婆字布兩䏶成地波羅蜜也金光明云十地脚足天台疏以十度是十地脚以訶字布兩足是定慧成矣如是諸法聚聯成身色性既智智性亦色當此智身布成之時障於是乎破德亦以是顯上冥法體下應羣生報智身色垂成于斯矣又復應知九梵字門入九賢聖位因果一合身法相冥即成以如來印八大菩薩所加持身本迹雖殊不思議一稱勝法門葢有由矣既安布已然後聲誦其誦法者先了音聲性空字色無相聲不緩急字無前後心性無性心不異緣屈曲梵聲與九梵字歷歷分明所布呪身與九聖相了了不昧如是念持進焉不已一一辨了無間明闇自然即見本尊相好光明眷屬圍繞與我對坐是為布字緣聲持法也正身威儀燒香散華同聲作是願言我某甲今欲念誦唯願本尊諸佛菩薩加持護念願令速得隨意所求悉地圓滿三唱竟一禮布字偈云先觀圓明無相身以唵布頂成種智折布瞳神二諦明戾布兩眼慈悲視主布頸喉辨無礙戾布兩肩弘誓在准布如來密藏心提布腰三三昧莎婆布䏶地波蜜呵布兩足定慧成如是布字想念已便成准提勝法門首者作白說呪緣起爾時世尊愍念未來薄福惡業諸眾生故即入准提三摩地說過去七俱胝佛所說陀羅尼眾共手結契印口誦呪言心存布梵其契印法以二手小指無名指相叉入掌二中指直竪相拄二頭指附二中指上節二大指附二頭指側即成南無颯哆南一三藐三勃陀俱胝南二怛姪他長引三唵折戾四主戾五准提六莎婆訶七壇中不便列坐但行立誦持一百八徧是悉地滿數今求三品悉地是宜三週百八不多不少首者依法持珠記數數滿歸位以印向頂解散首者白聞呪證位佛說此大准提陀羅尼法時無量眾生遠塵離垢得證准提陀羅尼功德得見十方諸佛菩薩聖眾決定成就阿耨多羅三藐三菩提白竟同聲作願我某甲以此念誦功德一切眾生所修真行求上中下悉地速得成就三唱一禮八修行五悔初懺悔法經云無量劫來五逆十惡重罪消滅則永無病苦不墮惡趣在所生處離苦得樂親遇諸佛成就菩提然我今日專守迷愚不事懺悔則三塗百劫墮苦無暇安問菩提何從見佛故當憶念先世罪業起大怖畏發露懺悔懺名懺謝悔名慚愧求哀改過是真懺悔勸請隨喜回向發願亦名悔者雖各立行同能滅罪勸請則滅波旬請佛入滅之罪隨喜則滅嫉他修善之愆回向則滅倒求三界之心發願則滅修行退志之過竭盡三業不惜身命泣血雨淚披露罪根法華三昧云業性雖空果報不失顛倒因緣起諸重罪流淚悲泣口宣懺悔先普懺想云我及眾生無始常為三業六根重罪所障不見諸佛不知出要但順生死不知妙理我今雖知猶與一切眾生同為一切重罪所障今對准提菩薩尊前普為眾生歸命懺悔唯願加護令障消滅想已唱云普為四恩三有法界眾生悉願斷除三障歸命懺悔唱已五體投地復為自懺想云我與眾生無始來今由愛見故內計我人外加惡友不隨喜他一毫之善唯徧三業廣造眾罪事雖不廣惡心徧布晝夜相續無有間斷覆諱過失不欲人知不畏惡道無慚無愧撥無因果故於今日深信因果生重慚愧生大怖畏發露懺悔斷相續心發菩提心斷惡修善勤策三業翻昔重過隨喜凡聖一毫之善念十方佛有大福慧能救我及諸眾生從二死海置三德岸從無始來不知諸法本性空寂廣造眾惡今知空寂為求菩提為眾生故廣修眾善徧斷眾惡唯願准提慈悲攝受想訖唱云至心懺悔比丘某甲等與法界一切眾生現前一念廣大圓明具諸總持安住祕藏良由無始隨順迷流障此圓明失守祕藏六根六塵交生染著循環三界無暫停時為身口意無惡不造恣殺生命偷盜邪淫妄言綺語兩舌惡口貪欲瞋恚邪見愚癡如是十惡自作教他隨喜惡人讚歎惡法重以起猛惡心造無間業弒父害母殺阿羅漢出佛身血破和合僧又復縱狂迷想開結使門邪徤保常世聰增慢不信方等互用招提于諸佛所法說非法非法說法于諸眾生有德失德非冤稱冤出世法律不樂奉持治世倫常至乖訓教如是等罪無量無邊捨茲形命當墮惡道唯我七俱胝佛母准提世尊愍念我故入三摩地說此准提大陀羅尼若有眾生能誦持者十惡五逆悉皆消滅故于今日依法修行奉對懺悔不敢覆藏仰願本尊准提菩薩摩訶薩具足五眼真實見知十八變手慇懃加護先令夢中得見聖眾口吐黑物身現吉祥次入三摩速圓悉地十度普攝定慧現前所有業障當下消除一切惡報未來不受三有永離諸根畢靜迷流妙湛心月圓明同佛受用開總持門與諸眾生終歸祕藏此文與上普懺及下四悔俱宜三說若時促者夜三或可一說晝三幸勿簡略說竟起身唱結懺悔已歸命禮三寶一禮次勸請法燒香互跪我某甲至心勸請十方一切佛現前得道者今請轉法輪安樂諸羣生十方一切佛若欲捨壽命我今頭面禮勸請久住世勸請已歸命禮三寶次隨喜法我某甲至心隨喜所有布施福持戒修禪行從身口意生去來今所有習學三乘人成就三乘者一切凡夫福皆隨而歡喜隨喜已皈命禮三寶次回向法我某甲至心回向我所有福德一切皆和合為諸眾生故正迴向佛道罪應如是懺勸請隨喜福回向於菩提及真如法界回向已皈命禮三寶次發願法我某甲至心發願願諸眾生等悉發菩提心定慧常現前證地波羅蜜願我命終時往生安樂剎得記還娑婆教化諸眾生發願已歸命禮三寶九行道旋繞正身威儀右繞法座燒香散華徐步安庠觀前所修供養禮拜誦持五悔等一一性空了無所得舉足下足不住行相香光莊嚴影現十方心想如夢梵聲如嚮同作契唄南無十方佛南無十方法南無十方僧南無七俱胝佛母准提佛南無七俱胝佛母准提陀羅尼南無本尊准提菩薩南無觀自在菩薩南無金剛手菩薩南無大輪明王菩薩或三稱或七稱還至像前自皈依佛當願眾生體解大道發無上心自皈依法當願眾生深入經藏智慧如海自皈依僧當願眾生統理大眾一切無礙和南聖眾十入三摩地行者禮懺訖應出道場別於一處身就繩牀入三摩地念誦儀云端身閉目澄心靜慮當於𮌎臆炳現圓明如滿月相而於圓明中布唵字餘八字右旋布於定中既不散動即與般若波羅蜜相應即畫一相隨而思惟字母種性相義唵是一切法本不生義亦是三身義此是不空譯據果義也又流注不生滅義亦是最勝義流注即微細煩惱此金剛智譯據因義也折是無行義金譯又一切法不生不滅義不譯此以寂止為行戾是無相義主是無起住義戾是無垢義准是無等覺義提是無取捨義婆是平等無言說義訶是無因寂靜無住涅槃義此明相此九梵字與今家十乘更無差忒言十乘者初觀不思議境二真正發菩提心三善巧安心止觀四破法徧五識通塞六調適道品七對治助開八知位次九能安忍十離法愛今輙釋其意真言九字即依不思議觀境發菩提心等九法乘也以初相是其理境圓明絕待本不生滅無行無相無起無垢無等無取無言無住然九字真詮相由以進由本不生即得無行以至由無言說即得雙忘因果般若相應以無所得而為方便入勝義實則證真如無斷無續圓轉無端是為初旋陀羅尼門相如車體方便如具度若能如是修行定慧現前證地波羅蜜疾至無上正等菩提故知相與九梵字十乘意備復次此法先令行者自誓菩提心于四威儀發四弘誓莊嚴三業乃至菩提道場若非依理豈離縛脫依理興誓得名真正初不思議境即菩提本後之八字成菩提法故以字布於中而餘八右旋周布輪緣去聲應知此經純明菩提之行又復此真言道部在密圓十法成乘教是顯圓顯密有殊圓觀理等今之觀法顯密圓修仍有二種謂有相無相有相顯法門身前已略明無相觀實相身者初相是不思議境秪就一念炳現圓明雖具十界百界千如不生不滅亦非因果法界一實平等如如言語道斷心行處滅故祕密示及顯了詮皆不可以識識烏得以言言是為不思議相也字是發菩提心者既深識圓明不思議境復思一切眾生念念皆爾知一苦一切苦自悲昔苦悲他亦然即起大悲興兩誓願一切法本不生故度本不生之眾生流注不生不滅故斷不生不滅之煩惱知一樂一切樂我及眾生昔雖求樂不知樂因今始方解故起大慈興兩誓願學最勝無量法門成三身無上佛道如此慈悲誓願與上圓明境智非前非後同時俱起故曰唵字布中是為一切流注法本不生及最勝三身義字止觀巧安者上深達圓明境智博運廣大慈悲今行行填願行即止觀須用不二止觀安於法性使寂照不二是行即無行義又以寂止法安心者諸法生滅今體其實生唯法性生滅唯法性滅常是法性無不法性時是一切法不生不滅義字是破徧者理若未顯由三惑覆當觀此惑本空觀智亦絕是無相義字識通塞者若著此能觀則於通起塞識此通塞則無起住義字是道品者觀雖無相證由道品品未調適未離染垢品次相生是無垢義字是對治助開者蔽資理惑不顯真如事度助開見齊妙覺是無等覺義字是知位次者乍息心謂為深詣若知圓位免增上慢不推聖境是無取捨義字是能安忍者名利眷屬三術離之於違順境安然不動是平等無言說義字是離法愛者行上九事過內外障若起法愛著靜似因無住風息若離此愛發真中道自然流入薩婆若海是為無因寂靜無住涅槃義上根觀境即入初住或內外凡中根二至七下根盡用全性起修全修在性統唯一實故名真實相也此無相行與上有相行相須而進若行立誦持若却坐思惟不思議觀未始暫離是名依教修行故前立布字法門今示十乘實相此十乘相即所布法既令依教修行即名字修相專注觀行成一切悉地即觀行修相以方便慧入勝義實即相似修相定慧現前證地波羅蜜乃至無上菩提即分滿證相又復行者未能修上二法但當深信斷諸疑心誦此陀羅尼數十萬徧先見種種罪滅清淨之相爾乃進此二法自然任運流入而無阻滯矣故知初心習行入門多種妙悟之時理應兩捨分持明驗相第五持驗之相有乎二種一者先行二依法誦持先行者謂但能口誦未起觀解然能滿十萬徧者即得夢見諸佛聖賢口吐黑物若有十惡業罪不得見者更誦十萬即夢境中或見諸天堂寺或與天女娛樂或登山渡海或騰空浴池或食酪飯或飲甘露或陞座說法或乘船遊嬉或見沙門居士或見日月男女或鬬勝黑夫或怖走牛馬種種罪滅清淨之相設有五逆極重之障未能豫見吉祥之相更加七十萬徧決定得見如前相貌此滿九十萬徧乃得見相葢據具有五逆十惡罪者法華三昧云若得種種諸靈異好夢是下品戒根淨相也次依法誦持有二種一緣聲布字持二入三摩地持是二求世間出世間悉地無不成就初緣聲布字持者行者用陀羅尼九字布安于身即成以如來印八大菩薩所加持身其身即是准提佛母金剛不壞滅除一切業障積集無量福德故誦滿三十萬徧者即得金剛手菩薩攝往自宮此金剛手即八菩薩之一謂金剛薩埵上師也正法念經云昔有國王夫人生千子欲試當來成佛之次第故俱留孫探得第一籌釋迦當第四籌乃至樓至當千籌第二夫人生二子一願為梵王請千兄轉法輪次願為密跡金剛神護千兄教法又如來不思議祕密大乘經持國輪王先行品同凡諸密部是其請說手擲金剛杵亦謂之執金剛今地婆訶羅初譯云金剛主亦云金剛手金剛智再譯云金剛藏不空三譯云金剛手名出不同實則一位祕密三昧大教王經云若入阿脩羅宮能現一切幻化事能作一切調伏法也誦滿六十萬徧者得見觀自在菩薩金剛手菩薩多羅菩薩隨心滿願若滿百萬徧者諸佛菩薩為其說法常得隨從亦得往詣十方淨土歷事諸佛親聞妙法又誦一俱胝徧者不轉肉身往兜率宮隨彌勒菩薩聽聞正法得不退轉或得無能勝菩薩願為說法訶利底母授與法藥等是皆行立誦持不入三昧但依法布字緣聲誦持者故法華安樂行不入三昧但行立誦持亦得見普賢上妙色像也入三摩地持者專注觀行入三摩地端身閉目澄心靜意當於胸臆炳現圓明猶如滿月於圓明中思惟唵等九字種性入旋陀羅尼門必當得見本源清淨之心與般若波羅蜜相應定慧現前證入十地也法華三昧云行者於行坐念誦之中身心寂然猶如虗空入諸寂定於正慧中面見普賢菩薩乘六牙白象與無量菩薩而自圍繞以一切眾生所喜見身現其人前是人以見普賢菩薩故即得三昧及陀羅尼三昧是定陀羅尼是慧即是定慧二根淨相也更須委檢蘇悉地經三品悉地附本呪同譯佛說七俱胝佛母心大准提陀羅尼經唐武周沙門地婆訶羅譯今懺本承佛母准提大明陀羅尼經天竺三藏金剛智譯娜麼颯哆喃一三藐三勃䭾俱胝喃二呾姪他三唵四折𨽻五注𨽻六准提七莎縛二合訶八七俱胝佛母所說准提陀羅尼經大興善寺三藏沙門大廣智不空譯曩謨颯多引南引三藐三沒䭾引俱引胝南引怛儞也二合佗引唵者禮主禮准泥娑縛二合賀引七俱胝佛神呪宇文周北天竺三藏闍那崛多譯載種種雜呪經納莫颯多喃三藐三佛陀俱胝南怛姪他唵折麗主麗准遞莎訶七俱胝佛呪三藏法師玄奘譯載呪五首經納莫颯多喃去三藐三勃陀俱胝南去怛姪他唵折麗主麗准第莎訶七十七俱胝如來同說陀羅尼山佛說大乘莊嚴寶王經宋西天中印度惹爛䭾囉國三藏沙門天息灾譯曩莫入聲一颯鉢多二合引喃引二三藐訖三二合沒䭾三句引致喃引四但儞也二合他去聲五唵引左𨽻引祖隷引噂上聲禰引六莎嚩二合引賀引七佛說瑜伽大教王經真言變化品云爾時世尊入等虗空大海變化神通三昧三摩地出此定已從三金剛說此大尊那菩薩真言宋中印土沙門法賢譯那莫颯鉢多二合引曩引一三藐訖三二合沒䭾引酤引致引曩引二怛𭔞切身他引三唵引左𨽻引祖𨽻引尊禰引莎嚩二合引賀引四七俱胝佛母心大准提呪大夏天慶間蘭山崇法禪師沙門金剛幢譯定密呪圓因往生集捺麻薩不怛二合喃引薩滅三莫𭊁光引低引喃引怛涅達唵桚令足令尊寧莎引訶引准提三昧行法附呪終
